context:
  name: csp-gateway
  version: "2.7.1"
  python_min: "3.11"

recipe:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://files.pythonhosted.org/packages/19/1e/cff4b6131e061c65852388a40b8e1f7e5a60b63c866607d813929505c433/csp_gateway-${{ version }}.tar.gz
  sha256: ad8f8fc56776740454c1895bb5046036a02ecc1339221d5c4bd38248f154d28a

build:
  number: 0

outputs:
  - package:
      name: ${{ name|lower }}
    build:
      noarch: python
      script: python -m pip install . -vv --no-deps --no-build-isolation
      python:
        entry_points:
          - cspgateway-start = csp_gateway.server.cli:main
          - cspgateway_start = csp_gateway.server.cli:main
          - csp-gateway-start = csp_gateway.server.cli:main
          - csp_gateway_start = csp_gateway.server.cli:main
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
        - hatch-js
        - hatch-multi
        - pnpm
      run:
        - python >=${{ python_min }}
        - atomic-counter >=0.1.3
        - ccflow >=0.8.0,<1
        - colorlog
        - csp >=0.14.0,<1
        - deprecation
        - duckdb >=1.4.1,<2
        - fastapi >=0.110
        - fsspec
        - httpx
        - hydra-core
        - janus
        - omegaconf
        - orjson
        - perspective >=4.5,<4.6
        - psutil
        - pyarrow
        - pydantic >=2,<3
        - uvicorn >=0.28.1,<0.41
        - uvloop
        - websockets
        # Client
        - httpx
        - jsonref
        - nest-asyncio
        - packaging
        - pydantic >=2,<3
    tests:
      - python:
          imports:
            - csp_gateway
            - csp_gateway.server
            - csp_gateway.client
          pip_check: true
          python_version: ${{ python_min }}.*
      - script:
          - csp-gateway-start --help
  - package:
      name: ${{ name|lower }}-client
    build:
      noarch: python
      script: python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling
        - hatch-js
        - hatch-multi
        - pnpm
      run:
        - python >=${{ python_min }}
        - httpx
        - jsonref
        - nest-asyncio
        - packaging
        - pydantic >=2,<3
    tests:
      - python:
          imports:
            - csp_gateway
            - csp_gateway.client
          pip_check: false
          python_version:
            - "3.11"
            - "*"

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Application framework built on CSP
  homepage: https://github.com/point72/csp-gateway
  repository: https://github.com/point72/csp-gateway

extra:
  recipe-maintainers:
    - arhamchopra
    - hintse
    - neejweej
    - ptomecek
    - timkpaine
